<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logging in...</title>
  <style>
    body { background: #0a0a0a; color: #fff; font-family: system-ui; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .msg { text-align: center; font-size: 1.2rem; }
    .error { color: #ff4444; }
  </style>
</head>
<body>
  <div class="msg" id="status">Completing login...</div>
  <script src="auth.js"></script>
  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');

      if (error) {
        document.getElementById('status').innerHTML = `<span class="error">Login denied: ${error}</span><br><a href="/" style="color:#1db954">Back to game</a>`;
        return;
      }

      if (!code) {
        document.getElementById('status').innerHTML = `<span class="error">No authorization code received</span><br><a href="/" style="color:#1db954">Back to game</a>`;
        return;
      }

      try {
        await exchangeCodeForToken(code);
        window.location.href = '/';
      } catch (e) {
        document.getElementById('status').innerHTML = `<span class="error">Login failed: ${e.message}</span><br><a href="/" style="color:#1db954">Try again</a>`;
      }
    })();
  </script>
</body>
</html>
